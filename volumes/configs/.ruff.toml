# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as pylint configuration.
line-length = 100
indent-width = 4

# Python version from pylint config.
target-version = "py310"

[lint]
# Select all rules that are equivalent to pylint's default + important ones.
# E: pycodestyle errors
# F: Pyflakes  
# W: pycodestyle warnings
# C90: mccabe complexity
# PL: pylint rules (ruff's reimplementation)
# B: flake8-bugbear
# A: flake8-builtins
# C4: flake8-comprehensions
# SIM: flake8-simplify
# UP: pyupgrade
select = [
    "E", 
    "F", 
    "W", 
    "C90", 
    "PL", 
    "B", 
    "A", 
    "C4", 
    "SIM", 
    "UP",
    # Additional rules for security and best practices
    "S",   # flake8-bandit
    "T20", # flake8-print
    "T10", # flake8-debugger
]

# Ignore rules that pylint had disabled or aren't relevant
ignore = [
    "E501",   # Line too long (handled separately)
    "PLW0603", # Using the global statement (pylint allowed this)
    "PLW2901", # Outer loop variable overwritten by inner assignment
    "PLR2004", # Magic value used in comparison
]

# Allow fix for all enabled rules (when --fix) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.pylint]
# Map pylint's complexity settings to ruff
max-args = 5
max-branches = 12
max-locals = 15
max-statements = 50
max-returns = 6

[lint.mccabe]
# Same as pylint default
max-complexity = 10

[lint.per-file-ignores]
# No per-file ignores allowed to prevent circumventing checks

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings.
docstring-code-format = false

[lint.isort]
# Import sorting settings
combine-as-imports = true
force-sort-within-sections = true
force-wrap-aliases = true
lines-after-imports = 1
order-by-type = true
relative-imports-order = "closest-to-furthest"